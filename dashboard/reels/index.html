<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reels">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>Daily Intelligence — Reels</title>
<script>
  // Same education layer as the dashboard (cache-busted like index.html does).
  document.write('<script src="../glossary.js?v=' + Date.now() + '"><\/script>');
</script>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1620; --line:#222c3b; --txt:#e7edf5; --dim:#8ea0b5;
    --accent:#5b9dff; --amber:#f5b942;
    --up:#3fb950; --down:#f4685f;
    --geopolitics:#f4685f; --economy:#3fb950; --technology:#a970ff; --science:#2dd4bf;
    --health:#f472b6; --climate:#5cc98a; --india:#ff9933; --markets:#5b9dff; --learn:#f5b942;
  --f1:#e10600; --cricket:#2fbf71;
    /* native fonts (no downloads): rounded headings, neutral sans UI, editorial serif for reading */
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",Roboto,sans-serif;
    --serif:ui-serif,"New York",Georgia,Cambria,"Times New Roman",serif;
    /* clears the progress segments + header (with the World/Markets toggle) + notch */
    --deck-top:calc(env(safe-area-inset-top) + 58px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:var(--accent);text-decoration:none}

  /* ---- the deck: full-screen vertical REEL — one card per screen, crisp snap ---- */
  /* faces are short (body text is hidden behind the expand button), so every card fits one
     screen and mandatory snap never clips anything. */
  #deck{position:fixed;inset:0;overflow-y:auto;scroll-snap-type:y mandatory;
    overscroll-behavior-y:contain;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #deck::-webkit-scrollbar{display:none}
  .card{min-height:100svh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;
    display:flex;flex-direction:column;justify-content:center;
    padding:calc(var(--deck-top) + 6px) 22px calc(30px + env(safe-area-inset-bottom));gap:16px}
  .card > *{width:100%;max-width:540px;margin-left:auto;margin-right:auto}
  /* soft category glow from the top — gives each card its own mood */
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:42vh;pointer-events:none;
    background:linear-gradient(180deg, color-mix(in srgb, var(--cat,var(--accent)) 15%, transparent), transparent)}

  /* Stories-style progress segments + slim header */
  #progress{position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:10px;right:10px;z-index:31;display:flex;gap:3px}
  #progress i{flex:1;height:3px;border-radius:2px;background:#2a3546;transition:background .2s}
  #progress i.done{background:var(--dim)} #progress i.on{background:var(--accent)}
  #hdr{position:fixed;top:calc(env(safe-area-inset-top) + 13px);left:12px;right:12px;z-index:30;
    display:flex;justify-content:center;align-items:center;gap:8px;font-size:11.5px;color:var(--dim)}
  #hdr .stale{color:var(--amber)}
  .hdr-actions{display:flex;gap:5px;flex:0 0 auto;align-items:center}
  #hdr .dash,#refresh{color:var(--dim);border:1px solid var(--line);border-radius:99px;background:rgba(11,15,23,.55);
    font-weight:700;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}
  #refresh.spin{animation:spin .7s linear infinite;color:var(--accent)}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* always-visible freshness pill — green ≤3h, amber ≤12h, red = stale. Tap = refresh. */
  #fresh{display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 8px;border-radius:99px;cursor:pointer;
    border:1px solid var(--line);background:rgba(11,15,23,.55);font-size:11.5px;font-weight:800;color:var(--dim);white-space:nowrap}
  #fresh .fdot{width:7px;height:7px;border-radius:99px;background:currentColor;flex:0 0 auto;
    box-shadow:0 0 0 3px color-mix(in srgb,currentColor 22%,transparent)}
  #fresh.ok{color:var(--up)} #fresh.aging{color:var(--amber)} #fresh.stale{color:var(--down)}
  /* Update status panel (opened from the freshness pill) */
  .ustat{padding:2px 0 6px}
  .ust-hero{font-family:var(--round);font-weight:800;font-size:20px;margin-bottom:14px}
  .ust-hero.ok{color:var(--up)} .ust-hero.aging{color:var(--amber)} .ust-hero.stale{color:var(--down)}
  .ust-rows{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel2)}
  .ust-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;font-size:14px}
  .ust-row+.ust-row{border-top:1px solid var(--line)}
  .ust-row span{color:var(--dim)} .ust-row b{color:var(--txt);font-weight:800;text-align:right;font-variant-numeric:tabular-nums}
  .ust-added{margin-top:16px} .ust-added .lbl{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
  .ua{display:flex;align-items:baseline;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:14px;line-height:1.35}
  .ua:first-of-type{border-top:0} .ua .uReg{flex:0 0 auto} .ua .uT{flex:1 1 auto;color:var(--txt);font-weight:600}
  .ua .uWhen{flex:0 0 auto;color:var(--dim);font-size:12px;font-weight:700}
  .ust-note{margin-top:16px;font-size:12.5px;line-height:1.55;color:var(--dim)}
  .ust-btn{margin-top:16px;width:100%;height:46px;border:none;border-radius:12px;cursor:pointer;
    font-family:var(--round);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--accent),#3a6fd0)}
  /* Global / India / Markets segmented toggle */
  #tabs{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:3px;gap:1px;
    min-width:0;max-width:100%;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #tabs::-webkit-scrollbar{display:none}
  #tabs button{font-family:var(--round);font-size:12.5px;font-weight:700;color:var(--dim);cursor:pointer;flex:0 0 auto;
    border:none;background:none;border-radius:99px;padding:7px 11px;min-height:34px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  #tabs button.on{color:#fff;background:linear-gradient(135deg, var(--tabcat,var(--accent)), color-mix(in srgb, var(--tabcat,var(--accent)) 62%, #000))}

  /* cover / divider centered */
  .cover,.divider{text-align:center}
  .cover .chips,.cover .meta,.divider .chips{justify-content:center}
  .scrollcue{font-size:12.5px;font-weight:600;color:var(--dim);animation:bob 1.7s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(5px);opacity:1}}
  .divider .t{font-family:var(--round);font-weight:800;font-size:26px;letter-spacing:.01em}
  .divider .sub{font-size:14px;color:var(--dim);margin-top:8px;line-height:1.5}
  .bigemoji{font-size:56px;line-height:1}

  /* ---- 🎓 Learn tab: lesson cards ---- */
  .cover .bigemoji{font-size:46px}
  .lcov-subj{font-family:var(--round);font-weight:800;font-size:26px;line-height:1.14;margin-top:12px}
  .lcov-part{font-size:13.5px;font-weight:700;color:var(--learn);margin-top:9px;line-height:1.4}
  .partbar{display:flex;gap:4px;justify-content:center;margin:14px auto 0;max-width:220px}
  .partbar i{flex:1;height:4px;border-radius:2px;background:#2a3546}
  .partbar i.done{background:var(--learn)} .partbar i.on{background:var(--learn);box-shadow:0 0 8px var(--learn)}
  .lcov-recap{margin-top:18px;font-size:14px;line-height:1.58;color:#c3cedd;text-align:left;
    background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--learn);border-radius:12px;
    padding:12px 14px;max-height:31vh;overflow:hidden}
  .lcov-lbl{display:block;font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--learn);margin-bottom:6px}
  .lrecap{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:11px}
  .lrecap li{position:relative;padding-left:22px;font-size:16px;line-height:1.5;color:#dbe3ee}
  .lrecap li::before{content:"✓";position:absolute;left:0;top:0;color:var(--learn);font-weight:800}
  .veil .lq{font-size:16px;line-height:1.5;font-weight:700;margin-bottom:10px}
  .lnext{margin-top:20px;font-size:14px;font-weight:700;color:var(--dim)}
  .prose{font-size:16px;line-height:1.68;color:#dbe3ee;margin:0 0 14px}
  .prose:last-child{margin-bottom:0}
  /* a worked example, set apart from the teaching prose */
  .example{background:color-mix(in srgb,var(--learn) 10%,var(--panel2));border:1px solid color-mix(in srgb,var(--learn) 26%,var(--line));
    border-left:3px solid var(--learn);border-radius:12px;padding:12px 14px;font-size:15.5px;line-height:1.62;color:#e2e9f2}
  /* the mark-complete CTA on the recap card */
  .donebtn{margin-top:20px;width:100%;min-height:52px;border:none;border-radius:15px;cursor:pointer;
    font-family:var(--round);font-weight:800;font-size:15px;letter-spacing:.2px;color:#0b0f17;
    background:linear-gradient(135deg,var(--learn),#e0a52f);box-shadow:0 8px 22px color-mix(in srgb,var(--learn) 34%,transparent)}
  .donebtn:active{transform:translateY(1px);filter:brightness(1.05)}
  .donebtn.is-done{background:var(--panel2);color:var(--up);border:1px solid color-mix(in srgb,var(--up) 40%,var(--line));box-shadow:none;cursor:default}
  /* the "sources & further reading" chip on the recap card */
  .lchip{margin-top:16px;width:100%;min-height:46px;border-radius:13px;cursor:pointer;font-family:var(--round);
    font-weight:700;font-size:14px;color:var(--learn);background:color-mix(in srgb,var(--learn) 10%,var(--panel2));
    border:1px solid color-mix(in srgb,var(--learn) 30%,var(--line))}
  .lchip:active{filter:brightness(1.08)}
  /* the journal (history) list on the Learn tab */
  .jlist{display:flex;flex-direction:column;gap:8px;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    margin-top:4px;padding-right:2px}
  .jlist::-webkit-scrollbar{display:none}
  .jrow{display:flex;align-items:center;gap:12px;padding:12px 13px;border:1px solid var(--line);border-radius:13px;
    background:var(--panel2);cursor:pointer}
  .jrow:active{background:var(--panel)}
  .jem{font-size:22px;flex:0 0 auto;line-height:1}
  .jmain{flex:1 1 auto;min-width:0}
  .jmain b{display:block;font-size:14.5px;font-weight:800;color:var(--txt)}
  .jmain span{display:block;font-size:12.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .jgo{flex:0 0 auto;color:var(--dim);font-size:20px;font-weight:700}
  .arch-hint{font-size:12.5px;line-height:1.5;color:var(--dim);margin:2px 0 12px}
  .jgo.lib-done{color:var(--up)} .jgo.lib-current{color:var(--learn)} .jgo.lib-ahead{color:var(--dim);opacity:.6}
  /* bottom toast (mark-complete feedback) */
  #toast{position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));transform:translate(-50%,20px);z-index:60;
    max-width:88vw;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:13px;
    padding:12px 18px;font-size:14px;font-weight:700;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  /* ---- cover header: eyebrow pill + freshness dot + stat pills ---- */
  .eyebrow{display:inline-flex;align-items:center;gap:8px;margin:0 auto;padding:6px 13px;border-radius:99px;
    background:var(--panel2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.02em}
  .eyebrow .sep{width:3px;height:3px;border-radius:99px;background:var(--line)}
  .eyebrow .day{color:var(--txt);text-transform:uppercase;letter-spacing:.09em;font-size:11.5px}
  .freshdot{display:inline-flex;align-items:center;gap:6px}
  .freshdot::before{content:"";width:7px;height:7px;border-radius:99px;box-shadow:0 0 0 3px color-mix(in srgb,currentColor 22%,transparent)}
  .freshdot.ok{color:var(--up)} .freshdot.ok::before{background:var(--up)}
  .freshdot.stale{color:var(--amber)} .freshdot.stale::before{background:var(--amber)}
  .statpills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .statpill{flex:1 1 0;min-width:78px;max-width:130px;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;padding:12px 8px;text-align:center}
  .statpill b{display:block;font-family:var(--round);font-size:24px;font-weight:800;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums}
  .statpill span{display:block;margin-top:5px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim)}

  /* ---- shared content ---- */
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;font-weight:600;color:var(--dim)}
  .newbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-weight:800;
    font-size:11.5px;color:#0b0f17;background:linear-gradient(90deg,#ffd76a,#ff8a3d);letter-spacing:.2px}
  .devbadge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-weight:800;
    font-size:11.5px;color:#0b0f17;background:linear-gradient(90deg,#6fd3ff,#4b9dff);letter-spacing:.2px}
  .prevref{display:flex;gap:10px;align-items:center;width:100%;text-align:left;margin:0 0 15px;padding:12px 13px;
    border:1px solid color-mix(in srgb,#4b9dff 42%,var(--line));border-radius:13px;
    background:color-mix(in srgb,#4b9dff 10%,var(--panel2));color:var(--txt);font:inherit;cursor:pointer}
  .prevref:active{background:color-mix(in srgb,#4b9dff 18%,var(--panel2))}
  .prevref .pv-ic{font-size:17px;flex:0 0 auto}
  .prevref .pv-t{flex:1;min-width:0;font-size:13.5px;font-weight:700;line-height:1.4}
  .prevref .pv-lbl{display:block;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    color:#7fb6ff;margin-bottom:3px}
  .prevref .pv-go{flex:0 0 auto;color:#7fb6ff;font-weight:800;font-size:17px}
  .catchip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;
    font-size:12.5px;font-weight:700;background:color-mix(in srgb, var(--cat, var(--accent)) 18%, transparent);
    color:var(--cat, var(--accent))}
  .ribbon{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11.5px;
    font-weight:700;background:rgba(245,185,66,.14);color:var(--amber)}
  .stance{display:inline-flex;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700;
    background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
  h1{margin:0;font-family:var(--round);font-size:22px;line-height:1.27;font-weight:700;letter-spacing:-.2px}
  h1.big{font-size:28px;line-height:1.2;font-weight:800;letter-spacing:-.4px}
  /* the news card face: the FULL headline, shown in full (no clamp) — nothing else competes for space */
  h1.headline{font-size:clamp(21px,5.4vw,27px);line-height:1.34;font-weight:800;letter-spacing:-.3px;
    overflow-wrap:break-word;word-break:normal}
  .body{font-size:16px;line-height:1.62;color:#d3dbe6}
  /* the news summary on the reel face — CLAMPED so a long story never pushes the button off-screen */
  h1.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .summary{font-size:15.5px;line-height:1.55;color:#cfd8e4;
    display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
  .summary mark{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--txt);border-radius:4px;padding:0 3px;font-weight:600}
  /* exact-timestamp + source line on a news story */
  .when{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--dim);margin-top:-6px}
  .when .wdot{width:6px;height:6px;border-radius:99px;background:var(--up);flex:0 0 auto;
    box-shadow:0 0 0 3px color-mix(in srgb,var(--up) 22%,transparent)}
  .when .wsrc{color:var(--cat,var(--accent))}
  mark{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--txt);border-radius:4px;padding:0 3px;font-weight:600}
  /* THE moot — the one takeaway, unmistakably the hero */
  .moot{background:linear-gradient(135deg, color-mix(in srgb, var(--cat,var(--accent)) 14%, var(--panel)), var(--panel2));
    border:1px solid color-mix(in srgb, var(--cat,var(--accent)) 32%, var(--line));
    border-left:5px solid var(--cat, var(--accent));border-radius:14px;padding:14px 16px}
  .moot .lbl{font-size:10.5px;font-weight:800;letter-spacing:.12em;color:var(--cat,var(--accent));text-transform:uppercase;margin-bottom:7px}
  .moot .txt{font-family:var(--round);font-size:18px;font-weight:700;line-height:1.5}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .cchip{font-size:12.5px;font-weight:600;padding:8px 13px;min-height:38px;display:inline-flex;align-items:center;
    border-radius:99px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer}
  .cchip:active{background:var(--panel)}
  /* the ATTRACTIVE expand button — reveals the full readable story in the sheet */
  .expand{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;min-height:52px;
    font-size:15px;font-weight:800;font-family:var(--round);letter-spacing:.2px;color:#fff;cursor:pointer;
    border:none;border-radius:15px;padding:0 20px;
    background:linear-gradient(135deg, var(--cat,var(--accent)), color-mix(in srgb, var(--cat,var(--accent)) 62%, #000));
    box-shadow:0 8px 22px color-mix(in srgb, var(--cat,var(--accent)) 34%, transparent)}
  .expand:active{transform:translateY(1px);filter:brightness(1.08)}
  .expand .ar{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;
    border-radius:99px;background:rgba(255,255,255,.22);font-size:13px}
  .daylbl{font-size:13px;font-weight:700;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  .counts{display:flex;gap:22px;justify-content:center;font-size:12.5px;color:var(--dim)}
  .counts b{color:var(--txt);font-size:19px;font-family:var(--round);display:block}

  /* board */
  .brow{display:flex;align-items:center;gap:10px;padding:11px 2px;min-height:44px;
    border-bottom:1px solid var(--line);cursor:pointer}
  .brow:last-child{border-bottom:none}
  .brow .nm{flex:1 1 auto;min-width:0}
  .brow .nm b{font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .nm span{display:block;font-size:10.5px;color:var(--dim)}
  .brow .val{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .brow .val .num{font-family:var(--round);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .pct{display:inline-block;font-size:12px;font-weight:800;padding:1px 8px;border-radius:99px;font-variant-numeric:tabular-nums}
  .pct.up{color:var(--up);background:color-mix(in srgb,var(--up) 16%,transparent)}
  .pct.down{color:var(--down);background:color-mix(in srgb,var(--down) 16%,transparent)}
  .up{color:var(--up)} .down{color:var(--down)}
  .spark{flex:0 0 48px}

  /* favorite */
  .price{font-family:var(--round);font-size:30px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .price .pct{font-size:15px;margin-left:10px;vertical-align:middle}

  /* quiz */
  .veil{position:relative;cursor:pointer}
  .veil .txt{filter:blur(9px);transition:filter .3s;user-select:none}
  .veil.open .txt{filter:none}
  .veil .tap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13.5px;font-weight:700;color:var(--txt)}
  .veil.open .tap{display:none}

  /* outro */
  .note{border:1px solid var(--line);border-radius:12px;background:var(--panel2);padding:11px 14px;font-size:14px;text-align:left}
  .note .w{color:var(--dim);font-size:12.5px}
  .disc{font-size:11.5px;line-height:1.5;color:var(--dim)}

  /* ---- bottom sheet (decode + glossary) ---- */
  #mask{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
  #mask.open{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--panel);
    border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;
    max-height:82vh;max-height:82dvh;transform:translateY(105%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column}
  #sheet.open{transform:translateY(0)}
  #sheet .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px 6px}
  #sheet .bar h3{margin:0;font-family:var(--round);font-size:18px;line-height:1.28;font-weight:800}
  #sheet .x{font-size:20px;color:var(--dim);cursor:pointer;padding:4px 8px;line-height:1;flex:0 0 auto;
    border:1px solid var(--line);border-radius:99px}
  #sbody{overflow-y:auto;padding:6px 18px calc(26px + env(safe-area-inset-bottom));overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  /* pinned takeaway at the top of the sheet */
  .sheetmoot{background:linear-gradient(135deg, color-mix(in srgb, var(--cat,var(--accent)) 15%, var(--panel2)), var(--panel2));
    border:1px solid color-mix(in srgb, var(--cat,var(--accent)) 30%, var(--line));border-left:5px solid var(--cat,var(--accent));
    border-radius:13px;padding:13px 15px;margin:6px 0 16px}
  .sheetmoot .lbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:6px}
  .sheetmoot .txt{font-family:var(--round);font-size:16px;font-weight:700;line-height:1.5}
  /* ---- the bulleted briefing: icon-led sections, one fact per line ---- */
  .bsec{padding:16px 0;border-top:1px solid var(--line)}
  .bsec:first-of-type{border-top:none;padding-top:6px}
  .bh{display:flex;align-items:center;gap:9px;font-family:var(--round);font-size:12px;font-weight:800;
    letter-spacing:.08em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:11px}
  .bi{display:inline-flex;width:26px;height:26px;flex:0 0 26px;align-items:center;justify-content:center;font-size:14px;
    border-radius:8px;background:color-mix(in srgb, var(--cat,var(--accent)) 16%, transparent)}
  .bsec ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
  .bsec li{position:relative;padding-left:20px;font-size:15.5px;line-height:1.5;color:#dbe3ee}
  .bsec li::before{content:"◆";position:absolute;left:0;top:1px;font-size:10px;color:var(--cat,var(--accent))}
  .bsec li mark{font-size:.94em}
  .kt{border-left:3px solid var(--cat,var(--accent));padding:5px 11px;margin:9px 0;font-size:14.5px;line-height:1.5}
  .kt b{color:var(--txt)}
  .fig{padding:6px 11px;margin:8px 0;font-size:15px;line-height:1.5;background:var(--panel2);border-radius:9px}
  .fig b{color:var(--txt);font-variant-numeric:tabular-nums}
  .figusd{color:var(--up);font-weight:700;font-size:13.5px;white-space:nowrap}
  /* concept mastery */
  #learned{display:inline-flex;align-items:center;gap:4px;height:32px;padding:0 9px;border-radius:99px;cursor:pointer;
    border:1px solid var(--line);background:rgba(11,15,23,.55);font-size:12.5px;font-weight:800;color:var(--dim);white-space:nowrap}
  .cchip.nudge{position:relative;border-color:color-mix(in srgb,var(--amber) 55%,var(--line));color:var(--amber)}
  .cchip.nudge::after{content:"NEW";position:absolute;top:-7px;right:-6px;font-size:8.5px;font-weight:800;letter-spacing:.04em;
    background:var(--amber);color:#0b0f17;border-radius:6px;padding:1px 4px}
  .mtiers{display:flex;gap:8px;margin:2px 0 14px}
  .mtier{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px 6px}
  .mtier b{display:block;font-family:var(--round);font-size:22px;font-weight:800;color:var(--txt);line-height:1}
  .mtier span{display:block;margin-top:4px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--dim)}
  .mnone{color:var(--dim);font-size:13.5px;padding:2px 0 6px}
  .mnote{color:var(--dim);font-size:12px;margin-top:14px;line-height:1.5}
  .entrow{display:flex;gap:8px;flex-wrap:wrap}
  .entlink,.entplain{font-size:13.5px;font-weight:700;padding:7px 12px;border-radius:99px;border:1px solid var(--line)}
  .entlink{color:var(--cat,var(--accent));text-decoration:none;background:color-mix(in srgb,var(--cat,var(--accent)) 10%,transparent)}
  .entlink:active{background:var(--panel)} .entplain{color:var(--dim)}
  .src{font-size:14px;line-height:1.5;margin:8px 0}
  .one{color:var(--dim);font-size:14px;margin-bottom:8px}
  .scale{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--dim);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:10px;overflow-x:auto;white-space:nowrap}

  #empty{position:fixed;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--dim)}
</style>
</head>
<body>

<div id="progress"></div>
<div id="hdr">
  <div id="tabs">
    <button data-p="global" onclick="setPillar('global')">🌍 Global</button>
    <button data-p="india" onclick="setPillar('india')">🇮🇳 India</button>
    <button data-p="f1" onclick="setPillar('f1')">🏎️ F1</button>
    <button data-p="cricket" onclick="setPillar('cricket')">🏏 Cricket</button>
    <button data-p="learn" onclick="setPillar('learn')">🎓 Learn</button>
  </div>
</div>
<div id="deck"></div>
<div id="empty"><div><div style="font-size:40px">📭</div>No deck yet for today.<br>Run the daily pipeline, then reload.</div></div>

<div id="mask" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="bar"><h3 id="stitle"></h3><span class="x" onclick="closeSheet()">✕</span></div>
  <div id="sbody"></div>
</div>

<script>
const esc = s => (s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const CAT = {
  geopolitics:{lbl:"Geopolitics",emoji:"🌍"}, economy:{lbl:"Economy",emoji:"💵"},
  technology:{lbl:"Technology",emoji:"⚙️"}, science:{lbl:"Science",emoji:"🔬"},
  health:{lbl:"Health",emoji:"🩺"}, climate:{lbl:"Climate",emoji:"🌱"}, india:{lbl:"India",emoji:"🇮🇳"},
  f1:{lbl:"Formula 1",emoji:"🏎️"}, cricket:{lbl:"Cricket",emoji:"🏏"},
  markets:{lbl:"Markets",emoji:"📈"}, learn:{lbl:"Learn",emoji:"🎓"}
};
const THREAD = {developing:"📈 Developing", escalating:"🔺 Escalating", cooling:"🔻 Cooling", resolved:"✅ Resolved"};
const sgn = p => p==null?'—':(p>=0?'+':'')+Number(p).toFixed(2)+'%';
const cls = p => p>=0?'up':'down';
const IS_LOCAL = /^(localhost|127\.|192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(location.hostname);

function relTime(iso){
  if(!iso) return '';
  const t = new Date(iso); if(isNaN(t)) return '';
  const m = Math.max(0, Math.round((Date.now()-t)/60000));
  if(m<2) return 'just now'; if(m<60) return m+'m ago';
  const h = Math.round(m/60); if(h<24) return h+'h ago';
  const d = Math.round(h/24); return d===1?'yesterday':d+'d ago';
}
const todayLocal = () => new Date().toLocaleDateString('en-CA');
// compact age like "40m" / "3h" / "2d" for the freshness pill
function ageShort(iso){
  if(!iso) return null;
  const t=new Date(iso); if(isNaN(t)) return null;
  return Math.max(0, Math.round((Date.now()-t)/60000));
}
// paint the header freshness pill from the deck's generated_at (green ≤3h, amber ≤12h, red = stale)
function paintFresh(){
  const el=document.getElementById('fresh'), lbl=document.getElementById('freshAge');
  if(!el||!lbl) return;
  const m = DECK ? ageShort(DECK.generated_at) : null;
  let state='stale', txt='stale';
  if(m!=null){ state = m<=180?'ok' : m<=720?'aging' : 'stale';
    txt = m<2?'now' : m<60?m+'m' : m<1440?Math.round(m/60)+'h' : Math.round(m/1440)+'d'; }
  el.className = state;
  lbl.textContent = txt;
  el.title = m==null ? 'No deck loaded — tap to refresh'
    : (state==='stale' ? `Stale — last updated ${txt} ago. Tap to refresh.` : `Updated ${txt} ago. Tap to refresh.`);
}
// highlight standalone money/percent figures — runs AFTER esc(), so it's injection-safe
const hl = s => esc(s).replace(/([₹$€£]\s?\d[\d,]*\.?\d*|\b\d+(?:\.\d+)?%)/g, '<mark>$1</mark>');

// a wall-clock time like "4:19 PM" from an ISO string
function fmtClock(iso){ if(!iso) return ''; const t=new Date(iso); if(isNaN(t)) return '';
  return t.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}); }

let DECK = null, STATUS = null, LESSONS = null, LEARN_CARDS = [];

// pull the public update record (dashboard/status.json) — powers the "Update status" panel
function loadStatus(){
  return fetch('../status.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(s=>{ if(s) STATUS=s; return s; });
}

// the detailed, honest "when is this updated" panel (opened by tapping the freshness pill)
// count story cards per region straight from the loaded deck (fallback when status.json is slow)
function deckCounts(){
  const c = {global:0, india:0, f1:0, cricket:0};
  if(DECK && DECK.cards) DECK.cards.forEach(x=>{ if(x.type==='story'){ const p=pillarOf(x); c[p]=(c[p]||0)+1; } });
  return c;
}
function openStatus(){
  if(!STATUS) loadStatus();                 // (re)fetch so the next open is fully populated
  const s = STATUS || {};
  const m = DECK ? ageShort(DECK.generated_at) : null;
  const state = m==null ? 'stale' : m<=180 ? 'ok' : m<=720 ? 'aging' : 'stale';
  const dot = state==='ok' ? '🟢' : state==='aging' ? '🟡' : '🔴';
  const heroTxt = state==='ok' ? 'Auto-updating' : state==='aging' ? 'Updating — a little behind' : 'Paused — your Mac was off';
  const cad = s.cadence_min || 30;
  const lastUpd = s.last_update ? relTime(s.last_update) : (DECK ? relTime(DECK.generated_at) : '—');
  const lastChk = s.last_check ? relTime(s.last_check) : null;
  const nextC = s.next_update_est ? fmtClock(s.next_update_est) : '';
  const counts = (s.counts && (s.counts.global||s.counts.india)) ? s.counts : deckCounts();
  const added = s.last_added || [];
  const addedHtml = added.length ? `<div class="ust-added"><div class="lbl">🆕 Just added</div>${
    added.map(a=>`<div class="ua"><span class="uReg">${({india:'🇮🇳',f1:'🏎️',cricket:'🏏'})[a.region]||'🌍'}</span>`
      +`<span class="uT">${esc(a.title)}</span>${a.published_iso?`<span class="uWhen">${esc(relTime(a.published_iso))}</span>`:''}</div>`).join('')}</div>` : '';
  const html = `<div class="ustat">
    <div class="ust-hero ${state}">${dot} ${heroTxt}</div>
    <div class="ust-rows">
      <div class="ust-row"><span>Last new story</span><b>${esc(lastUpd)}</b></div>
      ${lastChk?`<div class="ust-row"><span>Last checked for updates</span><b>${esc(lastChk)}</b></div>`:''}
      <div class="ust-row"><span>How often</span><b>2 Global + 2 India / ${cad} min · F1+Cricket ~2h</b></div>
      ${nextC?`<div class="ust-row"><span>Next update</span><b>≈ ${esc(nextC)}${state==='stale'?' · once Mac is on':''}</b></div>`:''}
      <div class="ust-row"><span>Stories in feed</span><b>${counts.global??'—'} 🌍 · ${counts.india??'—'} 🇮🇳 · ${counts.f1??'—'} 🏎️ · ${counts.cricket??'—'} 🏏</b></div>
    </div>
    ${addedHtml}
    <div class="ust-note">The feed tops up <b>automatically every ${cad} minutes while your Mac is awake</b> — 2 fresh Global + 2 India stories each time, with F1 &amp; Cricket refreshed about every 2 hours. No story repeats within a day. When the laptop is closed, nothing updates until it wakes.</div>
    <button class="ust-btn" onclick="refreshNow(document.getElementById('refresh'));closeSheet();">↻ Check for updates now</button>
  </div>`;
  openSheet('Update status', html, PILLARSEL==='india'?'india':'markets');
}

/* ---------- renderers: each card type ---------- */
function catStyle(cat){ return `--cat:var(--${CAT[cat]?cat:'markets'})`; }
function catChip(cat){
  const c = CAT[cat]||CAT.markets;
  return `<span class="catchip">${c.emoji} ${c.lbl}</span>`;
}
function threadRibbon(t){
  if(!t||!t.status) return '';
  const day = t.day?` — day ${esc(t.day)}`:'';
  return `<span class="ribbon">${THREAD[t.status]||'📈 '+esc(t.status)}${day}</span>`;
}
/* ---------- concept mastery — on-device only (localStorage), no accounts ---------- */
let CONCEPT_FREQ = {};   // how often each concept appears in today's deck (drives the "new to you" nudge)
function mLoad(){ try{ return JSON.parse(localStorage.getItem('di_mastery'))||{}; }catch(e){ return {}; } }
function mSave(m){ try{ localStorage.setItem('di_mastery', JSON.stringify(m)); }catch(e){} }
function masteryBump(key, kind){                 // kind: 'tap' (opened the glossary) | 'seen' (in a decode)
  if(!key || (typeof GLOSSARY!=='undefined' && !GLOSSARY[key])) return;
  const m=mLoad(), e=m[key]||{taps:0,seen:0};
  if(kind==='tap') e.taps=(e.taps||0)+1; else e.seen=(e.seen||0)+1;
  e.ts=Date.now(); m[key]=e; mSave(m); paintLearned();
}
function masteryNote(c){ ((c&&c.concepts)||[]).forEach(k=>masteryBump(k,'seen')); }
function mTier(e){ const t=(e&&e.taps)||0; if(t>=7)return 'mastered'; if(t>=3)return 'familiar'; if(t>=1||(e&&e.seen))return 'seen'; return null; }
function masteryCounts(){ const m=mLoad(), c={mastered:0,familiar:0,seen:0}; for(const k in m){ const t=mTier(m[k]); if(t&&GLOSSARY[k])c[t]++; } return c; }
function paintLearned(){ const el=document.getElementById('learnedN'); if(!el)return;
  const c=masteryCounts(); el.textContent = c.mastered+c.familiar+c.seen; }
function buildConceptFreq(){ CONCEPT_FREQ={}; ((DECK&&DECK.cards)||[]).forEach(c=>(c.concepts||[]).forEach(k=>{ CONCEPT_FREQ[k]=(CONCEPT_FREQ[k]||0)+1; })); }

function chips(keys){
  const ok = (keys||[]).filter(k=>typeof GLOSSARY!=='undefined'&&GLOSSARY[k]);
  if(!ok.length) return '';
  const m = mLoad();
  return `<div class="chips">${ok.map(k=>{
    const t = GLOSSARY[k].term.split(' — ')[0].split(' (')[0];
    const nudge = ((CONCEPT_FREQ[k]||0)>=3 && !(m[k]&&m[k].taps)) ? ' nudge' : '';
    return `<span class="cchip${nudge}" onclick="openGloss('${k}')">📚 ${esc(t)}</span>`;}).join('')}</div>`;
}
function openMastery(){
  const m=mLoad(), c=masteryCounts();
  const groups={mastered:[],familiar:[],seen:[]};
  for(const k in m){ const t=mTier(m[k]); if(t&&GLOSSARY[k]) groups[t].push(k); }
  const row=keys=>keys.length?`<div class="chips">${keys.sort().map(k=>{
      const t=GLOSSARY[k].term.split(' — ')[0].split(' (')[0];
      return `<span class="cchip" onclick="openGloss('${k}')">📚 ${esc(t)}</span>`;}).join('')}</div>`:`<div class="mnone">—</div>`;
  const nudge=Object.keys(CONCEPT_FREQ).filter(k=>GLOSSARY[k]&&CONCEPT_FREQ[k]>=3&&!(m[k]&&m[k].taps))
      .sort((a,b)=>CONCEPT_FREQ[b]-CONCEPT_FREQ[a]).slice(0,10);
  let h=`<div class="mtiers">
      <div class="mtier"><b>${c.mastered}</b><span>Mastered</span></div>
      <div class="mtier"><b>${c.familiar}</b><span>Familiar</span></div>
      <div class="mtier"><b>${c.seen}</b><span>Seen</span></div></div>`;
  if(nudge.length) h+=`<div class="bsec"><div class="bh"><span class="bi">✨</span>In today's feed — tap to learn</div>${row(nudge)}</div>`;
  h+=`<div class="bsec"><div class="bh"><span class="bi">🏆</span>Mastered — tapped 7+ times</div>${row(groups.mastered)}</div>`;
  h+=`<div class="bsec"><div class="bh"><span class="bi">🟢</span>Familiar — tapped 3+</div>${row(groups.familiar)}</div>`;
  h+=`<div class="bsec"><div class="bh"><span class="bi">👁️</span>Seen at least once</div>${row(groups.seen)}</div>`;
  h+=`<div class="mnote">Tap a 📚 concept anywhere in the feed to learn it — the more you tap, the higher it climbs. Counts live on this device only.</div>`;
  openSheet("Concepts you've learned", h, 'markets');
}

/* ---------- entity graph — tappable regions → entity.html (mirror of build_dashboard slugify) ---------- */
let ENTITY_SLUGS = new Set();
const ENTITY_ALIASES = {us:'United States','u.s.':'United States',usa:'United States','united states':'United States',
  america:'United States',uk:'United Kingdom','u.k.':'United Kingdom',britain:'United Kingdom','united kingdom':'United Kingdom',
  eu:'Europe','european union':'Europe',europe:'Europe','middle east':'Middle East',mideast:'Middle East',gulf:'Middle East',
  uae:'UAE','u.a.e.':'UAE',russia:'Russia',china:'China',india:'India',iran:'Iran',israel:'Israel',pakistan:'Pakistan',ukraine:'Ukraine'};
const ENTITY_STOP = new Set(['global','world','international','','asia','worldwide']);
function entitySlug(region){
  const raw=(region||'').trim(), key=raw.toLowerCase();
  if(ENTITY_STOP.has(key)) return null;
  const name=ENTITY_ALIASES[key]||raw;
  const slug=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  if(!slug||ENTITY_STOP.has(name.toLowerCase())) return null;
  return {slug,name};
}
function loadEntities(){
  return fetch('../entities.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ if(d&&d.entities) ENTITY_SLUGS=new Set(Object.keys(d.entities)); });
}
function regionRow(c){
  const seen=new Set(), items=[];
  for(const r of (c.regions||[]).map(entitySlug)){
    if(!r||seen.has(r.slug)) continue; seen.add(r.slug);
    items.push(ENTITY_SLUGS.has(r.slug)
      ? `<a class="entlink" href="../entity.html?e=${r.slug}">${esc(r.name)} →</a>`
      : `<span class="entplain">${esc(r.name)}</span>`);
  }
  if(!items.length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">🌐</span>Follow the players</div><div class="entrow">${items.join('')}</div></div>`;
}
function mootBlock(txt, lbl){
  return txt?`<div class="moot"><div class="lbl">💡 ${lbl||'The takeaway'}</div><div class="txt">${esc(txt)}</div></div>`:'';
}
// exact-timestamp + source line for a news story (the whole point of the feed)
function whenLine(c){
  const rel = relTime(c.published_iso);
  const abs = c.published_iso ? new Date(c.published_iso).toLocaleString() : '';
  const srcName = c.source ? String(c.source).split(' (')[0].trim() : '';   // strip any appended parenthetical
  const src = srcName ? `<span class="wsrc">${esc(srcName)}</span>` : '';
  if(!rel && !src) return '';
  return `<div class="when" title="${esc(abs)}">${rel?`<span class="wdot"></span>${esc(rel)}`:''}${rel&&src?' · ':''}${src}</div>`;
}
function sparkSVG(pts){
  if(!pts||pts.length<3) return '';
  const min=Math.min(...pts), max=Math.max(...pts), r=(max-min)||1;
  const xy = pts.map((v,i)=>`${(i/(pts.length-1)*58+2).toFixed(1)},${(16-(v-min)/r*12+1).toFixed(1)}`).join(' ');
  const up = pts[pts.length-1]>=pts[0];
  return `<svg class="spark" width="62" height="18" viewBox="0 0 62 18">
    <polyline points="${xy}" fill="none" stroke="${up?'var(--up)':'var(--down)'}" stroke-width="1.6"/></svg>`;
}

// The attractive expand button — the ONLY way the body text is revealed (keeps each reel face clean).
const expandBtn = (onclick, label) => `<button class="expand" onclick='${onclick}'>${label} <span class="ar">↓</span></button>`;
// the news summary shown ON the reel face (the takeaway now lives inside the full story instead)
const storySummary = c => c.what_happened || (c.key_points || []).join(' ') || c.moot || '';

// Reel faces: category + hook + THE TAKEAWAY (hero) + expand. Body stays hidden until the button is tapped.
const R = {
  cover: c => {
    const stale = DECK.date < todayLocal();
    return `
    <div class="eyebrow">
      <span class="day">${esc(DECK.day_label||DECK.date)}</span>
      <span class="sep"></span>
      <span class="freshdot ${stale?'stale':'ok'}">${stale?'yesterday’s deck':'updated '+esc(relTime(DECK.generated_at))}</span>
    </div>
    <h1 class="big">${esc(c.headline)}</h1>
    <div class="statpills">
      <div class="statpill"><b>${c.counts.stories}</b><span>World</span></div>
      <div class="statpill"><b>${c.counts.markets}</b><span>Markets</span></div>
      <div class="statpill"><b>${c.counts.learn}</b><span>Learn</span></div>
    </div>
    ${c.big_picture?expandBtn('openCover()', 'The big picture'):''}
    <div class="scrollcue">swipe up to begin ↑</div>`;
  },

  story: c => `
    <div class="meta">${catChip(c.category)}${c.development?'<span class="devbadge">🔄 Development</span>':(c.is_new?'<span class="newbadge">🆕 Just added</span>':'')}${threadRibbon(c.thread)}${c.importance==='critical'?'<span style="color:var(--down)">● critical</span>':''}</div>
    ${whenLine(c)}
    <h1 class="headline">${esc(c.title)}</h1>
    ${expandBtn(`openDecode(${JSON.stringify(c.id)})`, 'Read full story')}`,

  // 📜 end-of-feed archive gateway: the live feed is the top 20; older stories collect here
  archive: c => `
    <div class="meta">${catChip(c.category)}<span>the archive</span></div>

/* ---------- reel assembly + Stories-style progress ---------- */
const EXTRA = {cover:'cover', divider:'divider', lesson_cover:'cover', caught_up:'cover'};   // extra class on top of .card
const cardCat = c => c.category || ({concept:'learn', quiz:'learn'})[c.type] || 'markets';
const TAB_CAT = {global:'geopolitics', india:'india', f1:'f1', cricket:'cricket', markets:'markets', learn:'learn'};
const STORY_REGIONS = new Set(['india','f1','cricket']);   // a story's category IS its tab when it's one of these
const LESSON_TYPES = new Set(['lesson_cover','lesson','lesson_recap','learn_journal']);
// three tabs: a story goes to India if its category is india, else Global; the daily deep-dive lesson
// cards live on Learn. Outro (and anything unexpected) lives on Global.
function pillarOf(c){
  if(LESSON_TYPES.has(c.type)) return 'learn';
  if(c.type==='story') return STORY_REGIONS.has(c.category) ? c.category : 'global';
  if(c.type==='archive') return c.region;
  return 'global';
}
let PILLARSEL = 'global';

function setPillar(p){
  if(!DECK) return;
  PILLARSEL = p;
  let active=null;
  document.querySelectorAll('#tabs button').forEach(b=>{ const on=b.dataset.p===p; b.classList.toggle('on', on); if(on) active=b; });
  document.getElementById('tabs').style.setProperty('--tabcat', `var(--${TAB_CAT[p]})`);
  if(active) try{ active.scrollIntoView({inline:'center', block:'nearest'}); }catch(e){}   // keep the selected tab visible (5 tabs can overflow a narrow phone)
  try{ if((location.hash||'').replace(/^#/,'')!==p) history.replaceState(null,'',location.pathname+location.search+'#'+p); }catch(e){}
  render();
  document.getElementById('deck').scrollTo(0,0);
}

function render(){
  const deck = document.getElementById('deck');
  buildConceptFreq(); paintLearned();      // refresh the "new to you" nudges + learned count
  // Learn tab = built client-side from the lessons catalog (the reader's own pace); other tabs = news feed.
  let cards;
  if(PILLARSEL==='learn'){
    LEARN_CARDS = learnDeckCards();
    cards = LEARN_CARDS.map(c=>({card:c}));
  } else {
    cards = DECK.cards.filter(c => pillarOf(c)===PILLARSEL).map(c=>({card:c}));
  }
  if(!cards.length){
    const isLearn = PILLARSEL==='learn';
    const cat = isLearn?'learn':(TAB_CAT[PILLARSEL]||'geopolitics');
    const sport = PILLARSEL==='f1'?'Formula 1':(PILLARSEL==='cricket'?'Cricket':null);
    deck.innerHTML = `<section class="card" style="${catStyle(cat)}"><div class="meta">${catChip(cat)}</div>`
      + (isLearn
         ? `<h1>🎓 Your first lesson is being written</h1><div class="body" style="color:var(--dim)">Your course is prepared automatically — the first parts land shortly. Check back in a little while.</div>`
         : sport
         ? `<h1>${PILLARSEL==='f1'?'🏎️':'🏏'} ${sport} is warming up</h1><div class="body" style="color:var(--dim)">The top ${sport} story refreshes about every couple of hours. It'll appear here shortly.</div>`
         : `<h1>No stories yet</h1><div class="body" style="color:var(--dim)">The next update will fill this feed. Reload in a little while.</div>`)
      + `</section>`;
    document.getElementById('progress').innerHTML=''; paintFresh(); return; }

  deck.innerHTML = cards.map((x,i)=>{
    const cat = x.card ? cardCat(x.card) : x.cat;
    const inner = x.card ? (R[x.card.type]||(()=>''))(x.card) : (x.intro || '');
    const extra = x.card ? (EXTRA[x.card.type]||'') : (x.extra||'');
    return `<section class="card ${extra}" data-i="${i}" style="${catStyle(cat)}">${inner}</section>`;
  }).join('');

  const prog = document.getElementById('progress');
  prog.innerHTML = cards.map((_,i)=>`<i data-i="${i}"></i>`).join('');
  const segs = [...prog.children];
  // "on" = the card crossing the vertical middle → the progress segment tracks which reel you're on
  const io = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      const i = +e.target.dataset.i;
      segs.forEach((s,j)=>{ s.className = j<i?'done':(j===i?'on':''); });
    }});
  },{rootMargin:'-45% 0px -45% 0px', threshold:0});
  [...deck.children].forEach(el=>io.observe(el));
  paintFresh();
}

// re-pull the latest deck (regenerates ~every 2h on the laptop; SW is network-first so the phone gets it)
function refreshNow(btn){
  if(btn) btn.classList.add('spin');
  loadStatus(); loadEntities();
  fetch('../reels.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ if(d) DECK=d; render();
      setTimeout(()=>btn&&btn.classList.remove('spin'), 500);
    });
}

// Break prose into short sentence-bullets. Protect abbreviations so we never split "U.S." / "e.g.";
// require a SPACE after the period so decimals ("3.5 million") stay intact.
const ABBR = /\b(U\.S|U\.K|U\.N|E\.U|e\.g|i\.e|Mr|Mrs|Ms|Dr|Prof|Sen|Rep|Gov|Gen|Lt|Sgt|St|Jr|Sr|vs|etc|Inc|Ltd|Co|Corp|approx|No|Fig|a\.m|p\.m|Ph\.D)\./g;
function toBullets(text){
  if(!text) return [];
  try{
    const SENT = String.fromCharCode(1);                    // sentinel for abbreviation dots
    const masked = String(text).replace(ABBR, m=>m.split('.').join(SENT));
    return masked.split(/(?<=[.!?])\s+(?=[A-Z0-9"'“])/)
      .map(s=>s.split(SENT).join('.').trim()).filter(Boolean);
  }catch(e){ return [String(text).trim()]; }   // regex-lookbehind fallback (very old engines)
}
// one bulleted section: icon-led header + list; each bullet keeps number highlighting. Skips if empty.
function bulletSec(icon, label, items){
  const arr = (Array.isArray(items) ? items : toBullets(items)).filter(Boolean);
  if(!arr.length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">${icon}</span>${esc(label)}</div>`
    + `<ul>${arr.map(t=>`<li>${hl(t)}</li>`).join('')}</ul></div>`;
}
function keyTermsSec(terms){
  if(!(terms||[]).length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">📚</span>Key terms</div>`
    + terms.map(t=>`<div class="kt"><b>${esc(t.term)}</b> — ${esc(t.definition)}</div>`).join('') + `</div>`;
}
function sourcesSec(sources){
  if(!(sources||[]).length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">🔗</span>Sources</div>`
    + sources.map(s=>`<div class="src"><a href="${esc(s.url)}" target="_blank">${esc(s.name)}</a></div>`).join('') + `</div>`;
}
function pinnedMoot(txt){ return txt?`<div class="sheetmoot"><div class="lbl">💡 The takeaway</div><div class="txt">${esc(txt)}</div></div>`:''; }
// India-notation money made legible (built deterministically in build_dashboard.py — never invented)
function figuresSec(figs){
  if(!(figs||[]).length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">🔢</span>By the numbers</div>`
    + figs.map(f=>`<div class="fig"><b>${esc(f.raw)}</b> = ${esc(f.words)}`
        + `${f.usd_approx?` <span class="figusd">${esc(f.usd_approx)}</span>`:''}</div>`).join('')
    + `</div>`;
}
// a small course-progress bar (which part of the course you're on)
function partBar(part,total){
  total=+total||0; part=+part||0; if(total<2) return '';
  let s=''; for(let i=1;i<=total;i++) s+=`<i class="${i<part?'done':(i===part?'on':'')}"></i>`;
  return `<div class="partbar">${s}</div>`;
}
// flowing paragraphs (NOT sentence-bullets) — for the in-depth lesson prose
function proseSec(icon,label,text){
  if(!text) return '';
  const paras = String(text).split(/\n\n+/).map(p=>p.trim()).filter(Boolean);
  return `<div class="bsec"><div class="bh"><span class="bi">${icon}</span>${esc(label)}</div>`
    + paras.map(p=>`<p class="prose">${hl(p)}</p>`).join('') + `</div>`;
}
// open a lesson chunk's full depth in the sheet
function openLesson(id){
  const c = findLearn(id); if(!c) return;
  let h = pinnedMoot(c.key_takeaway);
  h += proseSec('📖','In depth', c.detail);
  h += exampleSec(c.example);
  h += bulletSec('✅','Worth remembering', c.points);
  h += keyTermsSec(c.key_terms);
  if((c.concepts||[]).length)
    h += `<div class="bsec"><div class="bh"><span class="bi">📚</span>Learn the concepts</div>${chips(c.concepts)}</div>`;
  masteryNote(c);
  openSheet(c.heading || 'Lesson', h, 'learn');
}

// a concrete worked example, set apart from the prose so it stands out
function exampleSec(text){
  if(!text) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">💡</span>For example</div>`
    + `<div class="example">${hl(String(text))}</div></div>`;
}

// open a part's real references (books/articles/institutions) in the sheet
function openLessonSources(id){
  const c = findLearn(id); if(!c) return;
  openSheet('Sources & further reading',
    sourcesSec(c.sources) || '<div class="one">No sources listed for this part.</div>', 'learn');

/* ---------- 📜 the rolling news archive (older stories that rotated out of the live top-20) ---------- */
let ARCHIVE_CACHE=null, ARCHIVE_VIEW=[];
const _tkey = t => (t||'').trim().toLowerCase();
const _sregion = s => STORY_REGIONS.has(s.category) ? s.category : 'global';
function openArchive(region){
  const label = ({india:'India', f1:'F1', cricket:'Cricket'})[region] || 'Global';
  openSheet('📜 Older '+label+' stories', '<div class="one">Loading the archive…</div>',
            STORY_REGIONS.has(region)?region:'markets');
  const paint = (all, hint, full) => {
    const live = new Set((DECK.cards||[]).filter(x=>x.type==='story').map(x=>_tkey(x.title)));
    const seen=new Set();
    ARCHIVE_VIEW = (all||[]).filter(s => _sregion(s)===region && !live.has(_tkey(s.title)))
      .filter(s => { const k=_tkey(s.title); if(!k||seen.has(k)) return false; seen.add(k); return true; })
      .sort((a,b)=>String(b.published_iso||'').localeCompare(String(a.published_iso||'')));
    const moreBtn = full ? '' :
      `<button class="ust-btn" style="margin-top:12px" onclick="loadFullHistory('${region}')">📚 Load full history</button>`;
    document.getElementById('sbody').innerHTML = ARCHIVE_VIEW.length
      ? `<div class="arch-hint">${hint||"Newest first — every story that's rotated out of the live feed. Tap one to read it."}</div>`
        + `<div class="jlist" style="max-height:66vh">${ARCHIVE_VIEW.map((s,i)=>`
            <div class="jrow" onclick='openArchiveStory(${i})'>
              <div class="jmain"><b>${esc(s.title)}</b><span>${esc(relTime(s.published_iso))}${s.source?' · '+esc(String(s.source).split(' (')[0]):''}</span></div>
              <div class="jgo">›</div></div>`).join('')}</div>` + moreBtn
      : '<div class="one">Nothing older archived yet — as newer stories arrive, older ones collect here.</div>' + moreBtn;
    document.getElementById('sbody').scrollTop = 0;
  };
  ARCHIVE_PAINT = paint;
  if(ARCHIVE_CACHE){ paint(ARCHIVE_CACHE); return; }
  fetch('../news-archive.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ ARCHIVE_CACHE = (d&&d.stories)||[]; paint(ARCHIVE_CACHE); });
}
let ARCHIVE_PAINT=null, HISTORY_CACHE=null;
// pull EVERY kept story from the permanent monthly shards (dashboard/archive/news-<YYYY-MM>.json)
function loadFullHistory(region){
  if(!ARCHIVE_PAINT) return;
  const done = all => { HISTORY_CACHE=all; ARCHIVE_PAINT(all, "Full history — every story we've kept, newest first. Tap one to read it.", true); };
  if(HISTORY_CACHE){ done(HISTORY_CACHE); return; }
  document.getElementById('sbody').insertAdjacentHTML('afterbegin', '<div class="one" style="color:var(--dim)">Loading full history…</div>');
  fetch('../archive/news-index.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(idx => Promise.all(((idx&&idx.months)||[]).map(m =>
        fetch('../archive/news-'+m+'.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null))))
    .then(shards => {
      const all=[]; (shards||[]).forEach(sh=>{ if(sh&&sh.stories) all.push(...sh.stories); });
      done(all.length ? all : (ARCHIVE_CACHE||[]));
    });
}
function openArchiveStory(i){ const c=ARCHIVE_VIEW[i]; if(c) openDecodeCard(c); }

// tap "Continues earlier coverage" → open the previous story (live feed first, then the archive)
function openPrevStory(title){
  const key=_tkey(title);
  const match = arr => (arr||[]).find(s=>_tkey(s.title)===key)
    || (arr||[]).find(s=>{ const k=_tkey(s.title); return k && key && (k.includes(key.slice(0,36)) || key.includes(k.slice(0,36))); });
  const live = (DECK && DECK.cards || []).filter(x=>x.type==='story');
  const hit = match(live);
  if(hit){ openDecodeCard(hit); return; }
  const go = arr => { const c=match(arr);
    if(c) openDecodeCard(c);
    else openSheet('Earlier story', `<div class="one">This story has rolled out of the saved archive, so the full decode isn’t available anymore.<br><br><b>${esc(title)}</b></div>`, 'markets'); };
  if(ARCHIVE_CACHE){ go(ARCHIVE_CACHE); return; }
  fetch('../news-archive.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ ARCHIVE_CACHE=(d&&d.stories)||[]; go(ARCHIVE_CACHE); });
}

/* ---------- 🎓 the course: a catalog (dashboard/lessons.json) the reader walks CLIENT-SIDE ---------- */
function cLoad(){ try{ return JSON.parse(localStorage.getItem('di_course'))||{}; }catch(e){ return {}; } }
function cSave(o){ try{ localStorage.setItem('di_course', JSON.stringify(o)); }catch(e){} }
function lessonParts(){ return (LESSONS && LESSONS.parts) || []; }
function lessonBySeq(seq){ return lessonParts().find(p=>p.seq===seq); }
// where the reader is now: their saved pos, else the first not-yet-completed part, else the last one
function coursePos(){
  const parts=lessonParts(); if(!parts.length) return 0;
  const o=cLoad(), done=o.done||{};
  const lo=parts[0].seq, hi=parts[parts.length-1].seq;
  let pos=o.pos;
  if(!pos){ const nxt=parts.find(p=>!done[p.seq]); pos = nxt?nxt.seq:(hi+1); }  // all done → past-the-end
  return Math.min(Math.max(pos, lo), hi+1);   // hi+1 = "caught up" sentinel
}
function setPos(seq){ const o=cLoad(); o.pos=seq; cSave(o); }

// build the Learn deck for the reader's current part: cover → chunk cards → recap, then the library card
function learnDeckCards(){
  const parts=lessonParts(); if(!parts.length) return [];
  const seq=coursePos(), p=lessonBySeq(seq), out=[];
  if(p){
    out.push({type:'lesson_cover', id:'lcov-'+seq, seq, emoji:p.emoji, subject_title:p.subject_title,
      part:p.part, total_parts:p.total_parts, session_title:p.session_title, recap_so_far:p.recap_so_far});
    (p.chunks||[]).forEach(ch=>out.push({type:'lesson', id:'lchunk-'+seq+'-'+ch.n, seq,
      n:ch.n, heading:ch.heading, idea:ch.idea, detail:ch.detail, example:ch.example, points:ch.points,
      key_takeaway:ch.key_takeaway, key_terms:ch.key_terms, concepts:ch.concepts,
      part:p.part, total_parts:p.total_parts, subject_title:p.subject_title}));
    out.push({type:'lesson_recap', id:'lrecap-'+seq, seq, recap:p.recap, check:p.check, sources:p.sources,
      next_up:p.next_up, part:p.part, total_parts:p.total_parts, subject_slug:p.subject_slug});
  } else {
    out.push({type:'caught_up', id:'caught'});
  }
  out.push({type:'library', id:'library'});
  return out;
}
function findLearn(id){ return (LEARN_CARDS||[]).find(x=>x.id===id); }

// mark-complete advances the reader through the ALREADY-published catalog — instant, works offline / on Pages
function lessonDoneBtn(c){
  const done=(cLoad().done||{})[c.seq];
  const hasNext=!!lessonBySeq(c.seq+1);
  if(done && !hasNext) return `<button class="donebtn is-done">✓ Completed — you're all caught up</button>`;
  const label = done ? "✓ Done — continue to the next part →" : "✓ Mark complete & continue →";
  return `<button class="donebtn${done?' is-done':''}" onclick='markLessonDone(${+c.seq||0})'>${label}</button>`;
}
function markLessonDone(seq){
  const o=cLoad(); o.done=o.done||{}; o.done[seq]=Date.now();
  const next=lessonBySeq(seq+1);
  o.pos = next ? next.seq : (seq+1); cSave(o);   // no next → past-the-end (shows the "caught up" card)
  render(); document.getElementById('deck').scrollTo(0,0);
  toast(next ? ('Nice work! On to Part '+(next.part||'')+' →')
             : "🎉 You're all caught up — new parts are added regularly.");
  // best-effort: tell the LOCAL pipeline how far you've read so it keeps parts buffered ahead (no-op on Pages)
  fetch('/api/lesson/progress', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({completed_seq:seq})}).catch(()=>{});
}
// 📚 the library: browse/re-read any part, see what's done / current / ahead
function openLibrary(){
  const parts=lessonParts(), done=(cLoad().done)||{}, pos=coursePos();
  if(!parts.length){ openSheet('📚 Your library', '<div class="one">Your first parts are being written — check back shortly.</div>', 'learn'); return; }
  const rows = parts.map(p=>{
    const st = done[p.seq] ? 'done' : (p.seq===pos ? 'current' : 'ahead');
    const badge = st==='done' ? '✓' : (st==='current' ? '▶' : '○');
    return `<div class="jrow" onclick='gotoLesson(${p.seq})'>
      <div class="jem">${esc(p.emoji||'🎓')}</div>
      <div class="jmain"><b>${esc(p.subject_title)} · Part ${esc(p.part)}/${esc(p.total_parts)}</b>
        <span>${esc(p.session_title||'')}</span></div>
      <div class="jgo lib-${st}">${badge}</div></div>`;
  }).join('');
  openSheet('📚 Your library',
    `<div class="arch-hint">${parts.length} part${parts.length==1?'':'s'} · ✓ done · ▶ current · ○ ahead — tap any to read or revisit</div>`
    + `<div class="jlist" style="max-height:70vh">${rows}</div>`, 'learn');
}
function gotoLesson(seq){ setPos(seq); closeSheet(); render(); document.getElementById('deck').scrollTo(0,0); }
// tiny bottom toast
let TOAST_T=null;
function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');
  clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>t.classList.remove('show'), 3200);
}

// primary narrative that lives ONLY in the sheet (hidden on the reel face), by card type
const LEAD = {story:'what_happened', watch:'gist', favorite:'whats_new', market_story:'story'};
function openDecode(id){ const c = DECK.cards.find(x=>x.id===id); if(c) openDecodeCard(c); }
function openDecodeCard(c){
  const d = c.depth||{}; let h = '';

  // NEWS STORIES: keep it tight — what happened, the backstory, the key points in plain language,
  // and the sources. Nothing else. (If it continues earlier coverage, lead with what's new.)
  if(c.type==='story'){
    if(c.development && c.prev_ref && c.prev_ref.title){
      h += `<button class="prevref" onclick='openPrevStory(${JSON.stringify(c.prev_ref.title)})'>`
        + `<span class="pv-ic">🔄</span>`
        + `<span class="pv-t"><span class="pv-lbl">Continues earlier coverage — tap to read it</span>${esc(c.prev_ref.title)}</span>`
        + `<span class="pv-go">›</span></button>`;
    }
    if(c.thread){
      h += bulletSec('🧵', 'Previously', c.thread.previously);
      h += bulletSec('🔄', "What's new today", c.thread.changed);
    }
    h += bulletSec('📰', 'What happened', c.what_happened);
    h += bulletSec('📖', 'The backstory', d.background);
    h += bulletSec('✦', 'Most important points', (c.key_points && c.key_points.length) ? c.key_points : null);
    h += sourcesSec(d.sources);
    masteryNote(c);
    openSheet(c.title || 'Decoded', h, c.category);
    return;
  }

  // Everything below is for the non-news card types (watch / favorite / market_story).
  if(c.type==='watch') h += pinnedMoot(c.moot);
  {
    const keyItems = (c.key_points && c.key_points.length) ? c.key_points : toBullets(c[LEAD[c.type]]);
    const keyLabel = {watch:'Key points', favorite:'What changed', market_story:'Key points'}[c.type] || 'Key points';
    h += bulletSec('✦', keyLabel, keyItems);
  }
  if(c.type==='watch'){
    h += bulletSec('🎯', 'What it means for you', c.what_it_means);
    h += bulletSec('❓', 'Why it matters', d.why_it_matters);
    h += bulletSec('👀', 'Watch', d.watch);
  }
  if(c.type==='favorite'){
    if(Array.isArray(d.news)&&d.news.length)
      h += `<div class="bsec"><div class="bh"><span class="bi">📰</span>Recent news</div>`
         + d.news.map(n=>`<div class="src">${n.url?`<a href="${esc(n.url)}" target="_blank">${esc(n.headline)}</a>`:esc(n.headline)}${n.source?` <span style="color:var(--dim)">— ${esc(n.source)}</span>`:''}</div>`).join('') + `</div>`;
    h += bulletSec('📊', 'Fundamentals', typeof d.fundamentals==='string'?d.fundamentals:null);
    h += bulletSec('📈', 'Technicals', typeof d.technicals==='string'?d.technicals:null);
    h += bulletSec('🚀', 'Catalysts', typeof d.catalysts==='string'?d.catalysts:null);
    h += bulletSec('⚠️', 'Risks', typeof d.risks==='string'?d.risks:null);
  }
  if(c.type==='market_story'){
    const g = d.global_summary||{};
    h += bulletSec('🇺🇸', 'United States', g.us);
    h += bulletSec('🇮🇳', 'India', g.india);
    h += bulletSec('₿', 'Crypto', g.crypto);
    h += bulletSec('🌍', 'Macro', g.macro);
    h += bulletSec('🗓️', "Today's catalysts", d.catalysts_today);
    h += bulletSec('⚠️', 'Risks', (d.risks||[]).map(x=>typeof x==='string'?x:JSON.stringify(x)));
  }
  h += figuresSec(c.figures);
  h += keyTermsSec(d.key_terms);
  if((c.concepts||[]).length)
    h += `<div class="bsec"><div class="bh"><span class="bi">📚</span>Learn the concepts</div>${chips(c.concepts)}</div>`;
  if(c.type==='story') h += regionRow(c);   // tappable players → entity timelines
  h += sourcesSec(d.sources);
  masteryNote(c);                          // credit concepts seen when a decode is opened
  openSheet(c.title||c.name||'Decoded', h, c.category);
}

function openCover(){
  const c = DECK.cards.find(x=>x.type==='cover'); if(!c) return;
  let h = bulletSec('✦', 'The big picture', c.big_picture);
  if(c.market_headline) h += bulletSec('📈', 'Markets today', c.market_headline);
  openSheet(c.headline, h, 'markets');
}

function openBoardRead(i){
  const c = DECK.cards.find(x=>x.type==='board'); if(!c) return;
  const b = c.items[i]; if(!b) return;
  openSheet(`${b.name} — ${b.currency||''}${b.value} (${sgn(b.change_pct)})`,
    bulletSec('💡', 'What this number is telling you', b.read)
    + (b.spark?`<div class="bsec"><div class="bh"><span class="bi">📉</span>Last ${b.spark.length} briefs</div><div class="src">${b.spark.map(v=>v.toLocaleString()).join(' → ')}</div></div>`:''),
    'markets');
}

function openGloss(key){
  const g = (typeof GLOSSARY!=='undefined')&&GLOSSARY[key]; if(!g) return;
  masteryBump(key, 'tap');                  // a direct tap = active learning
  openSheet(g.term,
    `<div class="one">${esc(g.one)}</div>`
    + bulletSec('📊', 'What it measures', g.what)
    + bulletSec('🔍', 'How to read it', g.read)
    + bulletSec('💡', 'Why it matters to you', g.why)
    + (g.scale?`<div class="scale">${esc(g.scale)}</div>`:''), 'learn');
}

/* ---------- boot ---------- */
// the Learn tab's catalog of parts (grows over time); re-render if we're already on Learn when it lands
function loadLessons(){
  return fetch('../lessons.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ if(d) LESSONS=d; if(DECK && PILLARSEL==='learn') render(); });
}
// the deck (reels.json) regenerates ~every 2h on the laptop; fetch the latest
loadStatus(); loadEntities(); loadLessons();
fetch('../reels.json?_='+Date.now())
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(d=>{ DECK=d;
    const h=(location.hash||'').replace(/^#/,'');           // deep-link a tab, e.g. #learn
    setPillar(['global','india','learn'].includes(h)?h:'global'); })
  .catch(()=>{ document.getElementById('empty').style.display='flex'; });
// let the tabs be shareable/deep-linkable + reflect the current tab in the URL
window.addEventListener('hashchange',()=>{ const h=(location.hash||'').replace(/^#/,'');
  if(['global','india','learn'].includes(h) && h!==PILLARSEL) setPillar(h); });

if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  // updateViaCache:'none' → always byte-check sw.js (never from HTTP cache), so a bumped SW is picked up fast.
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
    .then(reg=>reg.update()).catch(()=>{});
  // when a NEW sw version takes over (cache bumped), reload once so the fresh UI shows automatically —
  // no more manual hard-refresh. Skipped on the very first install (no prior controller).
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange', ()=>{
    if(hadController && !_swReloaded){ _swReloaded=true; location.reload(); }
  });
}
