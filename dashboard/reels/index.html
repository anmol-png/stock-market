<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0f17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reels">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>Daily Intelligence — Reels</title>
<script>
  // Same education layer as the dashboard (cache-busted like index.html does).
  document.write('<script src="../glossary.js?v=' + Date.now() + '"><\/script>');
</script>
<style>
  :root{
    --bg:#0b0f17; --panel:#131a26; --panel2:#0f1620; --line:#222c3b; --txt:#e7edf5; --dim:#8ea0b5;
    --accent:#5b9dff; --amber:#f5b942;
    --up:#3fb950; --down:#f4685f;
    --geopolitics:#f4685f; --economy:#3fb950; --technology:#a970ff; --science:#2dd4bf;
    --health:#f472b6; --climate:#5cc98a; --india:#ff9933; --markets:#5b9dff; --learn:#f5b942;
    /* native fonts (no downloads): rounded headings, neutral sans UI, editorial serif for reading */
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --round:ui-rounded,"SF Pro Rounded",-apple-system,"Segoe UI",Roboto,sans-serif;
    --serif:ui-serif,"New York",Georgia,Cambria,"Times New Roman",serif;
    /* clears the progress segments + header (with the World/Markets toggle) + notch */
    --deck-top:calc(env(safe-area-inset-top) + 58px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:var(--accent);text-decoration:none}

  /* ---- the deck: full-screen vertical REEL — one card per screen, crisp snap ---- */
  /* faces are short (body text is hidden behind the expand button), so every card fits one
     screen and mandatory snap never clips anything. */
  #deck{position:fixed;inset:0;overflow-y:auto;scroll-snap-type:y mandatory;
    overscroll-behavior-y:contain;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #deck::-webkit-scrollbar{display:none}
  .card{min-height:100svh;scroll-snap-align:start;scroll-snap-stop:always;position:relative;
    display:flex;flex-direction:column;justify-content:center;
    padding:calc(var(--deck-top) + 6px) 22px calc(30px + env(safe-area-inset-bottom));gap:16px}
  .card > *{width:100%;max-width:540px;margin-left:auto;margin-right:auto}
  /* soft category glow from the top — gives each card its own mood */
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:42vh;pointer-events:none;
    background:linear-gradient(180deg, color-mix(in srgb, var(--cat,var(--accent)) 15%, transparent), transparent)}

  /* Stories-style progress segments + slim header */
  #progress{position:fixed;top:calc(env(safe-area-inset-top) + 6px);left:10px;right:10px;z-index:31;display:flex;gap:3px}
  #progress i{flex:1;height:3px;border-radius:2px;background:#2a3546;transition:background .2s}
  #progress i.done{background:var(--dim)} #progress i.on{background:var(--accent)}
  #hdr{position:fixed;top:calc(env(safe-area-inset-top) + 13px);left:12px;right:12px;z-index:30;
    display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:11.5px;color:var(--dim)}
  #hdr .stale{color:var(--amber)}
  .hdr-actions{display:flex;gap:6px;flex:0 0 auto}
  #hdr .dash,#refresh{color:var(--dim);border:1px solid var(--line);border-radius:99px;background:rgba(11,15,23,.55);
    font-weight:700;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer}
  #refresh.spin{animation:spin .7s linear infinite;color:var(--accent)}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Global / India / Markets segmented toggle */
  #tabs{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:3px;gap:2px;min-width:0}
  #tabs button{font-family:var(--round);font-size:12.5px;font-weight:700;color:var(--dim);cursor:pointer;
    border:none;background:none;border-radius:99px;padding:7px 11px;min-height:34px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  #tabs button.on{color:#fff;background:linear-gradient(135deg, var(--tabcat,var(--accent)), color-mix(in srgb, var(--tabcat,var(--accent)) 62%, #000))}

  /* cover / divider centered */
  .cover,.divider{text-align:center}
  .cover .chips,.cover .meta,.divider .chips{justify-content:center}
  .scrollcue{font-size:12.5px;font-weight:600;color:var(--dim);animation:bob 1.7s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(5px);opacity:1}}
  .divider .t{font-family:var(--round);font-weight:800;font-size:26px;letter-spacing:.01em}
  .divider .sub{font-size:14px;color:var(--dim);margin-top:8px;line-height:1.5}
  .bigemoji{font-size:56px;line-height:1}

  /* ---- cover header: eyebrow pill + freshness dot + stat pills ---- */
  .eyebrow{display:inline-flex;align-items:center;gap:8px;margin:0 auto;padding:6px 13px;border-radius:99px;
    background:var(--panel2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.02em}
  .eyebrow .sep{width:3px;height:3px;border-radius:99px;background:var(--line)}
  .eyebrow .day{color:var(--txt);text-transform:uppercase;letter-spacing:.09em;font-size:11.5px}
  .freshdot{display:inline-flex;align-items:center;gap:6px}
  .freshdot::before{content:"";width:7px;height:7px;border-radius:99px;box-shadow:0 0 0 3px color-mix(in srgb,currentColor 22%,transparent)}
  .freshdot.ok{color:var(--up)} .freshdot.ok::before{background:var(--up)}
  .freshdot.stale{color:var(--amber)} .freshdot.stale::before{background:var(--amber)}
  .statpills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .statpill{flex:1 1 0;min-width:78px;max-width:130px;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;padding:12px 8px;text-align:center}
  .statpill b{display:block;font-family:var(--round);font-size:24px;font-weight:800;color:var(--txt);line-height:1;font-variant-numeric:tabular-nums}
  .statpill span{display:block;margin-top:5px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim)}

  /* ---- shared content ---- */
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12.5px;font-weight:600;color:var(--dim)}
  .catchip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;
    font-size:12.5px;font-weight:700;background:color-mix(in srgb, var(--cat, var(--accent)) 18%, transparent);
    color:var(--cat, var(--accent))}
  .ribbon{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11.5px;
    font-weight:700;background:rgba(245,185,66,.14);color:var(--amber)}
  .stance{display:inline-flex;padding:4px 11px;border-radius:99px;font-size:11.5px;font-weight:700;
    background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent)}
  h1{margin:0;font-family:var(--round);font-size:22px;line-height:1.27;font-weight:700;letter-spacing:-.2px}
  h1.big{font-size:28px;line-height:1.2;font-weight:800;letter-spacing:-.4px}
  .body{font-size:16px;line-height:1.62;color:#d3dbe6}
  mark{background:color-mix(in srgb,var(--amber) 20%,transparent);color:var(--txt);border-radius:4px;padding:0 3px;font-weight:600}
  /* THE moot — the one takeaway, unmistakably the hero */
  .moot{background:linear-gradient(135deg, color-mix(in srgb, var(--cat,var(--accent)) 14%, var(--panel)), var(--panel2));
    border:1px solid color-mix(in srgb, var(--cat,var(--accent)) 32%, var(--line));
    border-left:5px solid var(--cat, var(--accent));border-radius:14px;padding:14px 16px}
  .moot .lbl{font-size:10.5px;font-weight:800;letter-spacing:.12em;color:var(--cat,var(--accent));text-transform:uppercase;margin-bottom:7px}
  .moot .txt{font-family:var(--round);font-size:18px;font-weight:700;line-height:1.5}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .cchip{font-size:12.5px;font-weight:600;padding:8px 13px;min-height:38px;display:inline-flex;align-items:center;
    border-radius:99px;border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer}
  .cchip:active{background:var(--panel)}
  /* the ATTRACTIVE expand button — reveals the full readable story in the sheet */
  .expand{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;min-height:52px;
    font-size:15px;font-weight:800;font-family:var(--round);letter-spacing:.2px;color:#fff;cursor:pointer;
    border:none;border-radius:15px;padding:0 20px;
    background:linear-gradient(135deg, var(--cat,var(--accent)), color-mix(in srgb, var(--cat,var(--accent)) 62%, #000));
    box-shadow:0 8px 22px color-mix(in srgb, var(--cat,var(--accent)) 34%, transparent)}
  .expand:active{transform:translateY(1px);filter:brightness(1.08)}
  .expand .ar{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;
    border-radius:99px;background:rgba(255,255,255,.22);font-size:13px}
  .daylbl{font-size:13px;font-weight:700;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  .counts{display:flex;gap:22px;justify-content:center;font-size:12.5px;color:var(--dim)}
  .counts b{color:var(--txt);font-size:19px;font-family:var(--round);display:block}

  /* board */
  .brow{display:flex;align-items:center;gap:10px;padding:11px 2px;min-height:44px;
    border-bottom:1px solid var(--line);cursor:pointer}
  .brow:last-child{border-bottom:none}
  .brow .nm{flex:1 1 auto;min-width:0}
  .brow .nm b{font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brow .nm span{display:block;font-size:10.5px;color:var(--dim)}
  .brow .val{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .brow .val .num{font-family:var(--round);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .pct{display:inline-block;font-size:12px;font-weight:800;padding:1px 8px;border-radius:99px;font-variant-numeric:tabular-nums}
  .pct.up{color:var(--up);background:color-mix(in srgb,var(--up) 16%,transparent)}
  .pct.down{color:var(--down);background:color-mix(in srgb,var(--down) 16%,transparent)}
  .up{color:var(--up)} .down{color:var(--down)}
  .spark{flex:0 0 48px}

  /* favorite */
  .price{font-family:var(--round);font-size:30px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .price .pct{font-size:15px;margin-left:10px;vertical-align:middle}

  /* quiz */
  .veil{position:relative;cursor:pointer}
  .veil .txt{filter:blur(9px);transition:filter .3s;user-select:none}
  .veil.open .txt{filter:none}
  .veil .tap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:13.5px;font-weight:700;color:var(--txt)}
  .veil.open .tap{display:none}

  /* outro */
  .note{border:1px solid var(--line);border-radius:12px;background:var(--panel2);padding:11px 14px;font-size:14px;text-align:left}
  .note .w{color:var(--dim);font-size:12.5px}
  .disc{font-size:11.5px;line-height:1.5;color:var(--dim)}

  /* ---- bottom sheet (decode + glossary) ---- */
  #mask{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
  #mask.open{opacity:1;pointer-events:auto}
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--panel);
    border:1px solid var(--line);border-bottom:none;border-radius:20px 20px 0 0;
    max-height:82vh;max-height:82dvh;transform:translateY(105%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column}
  #sheet.open{transform:translateY(0)}
  #sheet .bar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px 6px}
  #sheet .bar h3{margin:0;font-family:var(--round);font-size:18px;line-height:1.28;font-weight:800}
  #sheet .x{font-size:20px;color:var(--dim);cursor:pointer;padding:4px 8px;line-height:1;flex:0 0 auto;
    border:1px solid var(--line);border-radius:99px}
  #sbody{overflow-y:auto;padding:6px 18px calc(26px + env(safe-area-inset-bottom));overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  /* pinned takeaway at the top of the sheet */
  .sheetmoot{background:linear-gradient(135deg, color-mix(in srgb, var(--cat,var(--accent)) 15%, var(--panel2)), var(--panel2));
    border:1px solid color-mix(in srgb, var(--cat,var(--accent)) 30%, var(--line));border-left:5px solid var(--cat,var(--accent));
    border-radius:13px;padding:13px 15px;margin:6px 0 16px}
  .sheetmoot .lbl{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:6px}
  .sheetmoot .txt{font-family:var(--round);font-size:16px;font-weight:700;line-height:1.5}
  /* ---- the bulleted briefing: icon-led sections, one fact per line ---- */
  .bsec{padding:16px 0;border-top:1px solid var(--line)}
  .bsec:first-of-type{border-top:none;padding-top:6px}
  .bh{display:flex;align-items:center;gap:9px;font-family:var(--round);font-size:12px;font-weight:800;
    letter-spacing:.08em;text-transform:uppercase;color:var(--cat,var(--accent));margin-bottom:11px}
  .bi{display:inline-flex;width:26px;height:26px;flex:0 0 26px;align-items:center;justify-content:center;font-size:14px;
    border-radius:8px;background:color-mix(in srgb, var(--cat,var(--accent)) 16%, transparent)}
  .bsec ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
  .bsec li{position:relative;padding-left:20px;font-size:15.5px;line-height:1.5;color:#dbe3ee}
  .bsec li::before{content:"◆";position:absolute;left:0;top:1px;font-size:10px;color:var(--cat,var(--accent))}
  .bsec li mark{font-size:.94em}
  .kt{border-left:3px solid var(--cat,var(--accent));padding:5px 11px;margin:9px 0;font-size:14.5px;line-height:1.5}
  .kt b{color:var(--txt)}
  .src{font-size:14px;line-height:1.5;margin:8px 0}
  .one{color:var(--dim);font-size:14px;margin-bottom:8px}
  .scale{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--dim);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:10px;overflow-x:auto;white-space:nowrap}

  #empty{position:fixed;inset:0;display:none;align-items:center;justify-content:center;text-align:center;padding:30px;color:var(--dim)}
</style>
</head>
<body>

<div id="progress"></div>
<div id="hdr">
  <div id="tabs">
    <button data-p="global" onclick="setPillar('global')">🌍 Global</button>
    <button data-p="india" onclick="setPillar('india')">🇮🇳 India</button>
    <button data-p="markets" onclick="setPillar('markets')">📈 Markets</button>
  </div>
  <div class="hdr-actions">
    <button id="refresh" title="Get the latest news" onclick="refreshNow(this)">↻</button>
    <a class="dash" href="../" title="Full dashboard">⧉</a>
  </div>
</div>
<div id="deck"></div>
<div id="empty"><div><div style="font-size:40px">📭</div>No deck yet for today.<br>Run the daily pipeline, then reload.</div></div>

<div id="mask" onclick="closeSheet()"></div>
<div id="sheet">
  <div class="bar"><h3 id="stitle"></h3><span class="x" onclick="closeSheet()">✕</span></div>
  <div id="sbody"></div>
</div>

<script>
const esc = s => (s==null?'':String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])));
const CAT = {
  geopolitics:{lbl:"Geopolitics",emoji:"🌍"}, economy:{lbl:"Economy",emoji:"💵"},
  technology:{lbl:"Technology",emoji:"⚙️"}, science:{lbl:"Science",emoji:"🔬"},
  health:{lbl:"Health",emoji:"🩺"}, climate:{lbl:"Climate",emoji:"🌱"}, india:{lbl:"India",emoji:"🇮🇳"},
  markets:{lbl:"Markets",emoji:"📈"}, learn:{lbl:"Learn",emoji:"🎓"}
};
const THREAD = {developing:"📈 Developing", escalating:"🔺 Escalating", cooling:"🔻 Cooling", resolved:"✅ Resolved"};
const sgn = p => p==null?'—':(p>=0?'+':'')+Number(p).toFixed(2)+'%';
const cls = p => p>=0?'up':'down';
const IS_LOCAL = /^(localhost|127\.|192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(location.hostname);

function relTime(iso){
  if(!iso) return '';
  const t = new Date(iso); if(isNaN(t)) return '';
  const m = Math.max(0, Math.round((Date.now()-t)/60000));
  if(m<2) return 'just now'; if(m<60) return m+'m ago';
  const h = Math.round(m/60); if(h<24) return h+'h ago';
  const d = Math.round(h/24); return d===1?'yesterday':d+'d ago';
}
const todayLocal = () => new Date().toLocaleDateString('en-CA');
// highlight standalone money/percent figures — runs AFTER esc(), so it's injection-safe
const hl = s => esc(s).replace(/([₹$€£]\s?\d[\d,]*\.?\d*|\b\d+(?:\.\d+)?%)/g, '<mark>$1</mark>');

let DECK = null;

/* ---------- renderers: each card type ---------- */
function catStyle(cat){ return `--cat:var(--${CAT[cat]?cat:'markets'})`; }
function catChip(cat){
  const c = CAT[cat]||CAT.markets;
  return `<span class="catchip">${c.emoji} ${c.lbl}</span>`;
}
function threadRibbon(t){
  if(!t||!t.status) return '';
  const day = t.day?` — day ${esc(t.day)}`:'';
  return `<span class="ribbon">${THREAD[t.status]||'📈 '+esc(t.status)}${day}</span>`;
}
function chips(keys){
  const ok = (keys||[]).filter(k=>typeof GLOSSARY!=='undefined'&&GLOSSARY[k]);
  return ok.length?`<div class="chips">${ok.map(k=>{
    const t = GLOSSARY[k].term.split(' — ')[0].split(' (')[0];
    return `<span class="cchip" onclick="openGloss('${k}')">📚 ${esc(t)}</span>`;}).join('')}</div>`:'';
}
function mootBlock(txt, lbl){
  return txt?`<div class="moot"><div class="lbl">💡 ${lbl||'The takeaway'}</div><div class="txt">${esc(txt)}</div></div>`:'';
}
function sparkSVG(pts){
  if(!pts||pts.length<3) return '';
  const min=Math.min(...pts), max=Math.max(...pts), r=(max-min)||1;
  const xy = pts.map((v,i)=>`${(i/(pts.length-1)*58+2).toFixed(1)},${(16-(v-min)/r*12+1).toFixed(1)}`).join(' ');
  const up = pts[pts.length-1]>=pts[0];
  return `<svg class="spark" width="62" height="18" viewBox="0 0 62 18">
    <polyline points="${xy}" fill="none" stroke="${up?'var(--up)':'var(--down)'}" stroke-width="1.6"/></svg>`;
}

// The attractive expand button — the ONLY way the body text is revealed (keeps each reel face clean).
const expandBtn = (onclick, label) => `<button class="expand" onclick='${onclick}'>${label} <span class="ar">↓</span></button>`;

// Reel faces: category + hook + THE TAKEAWAY (hero) + expand. Body stays hidden until the button is tapped.
const R = {
  cover: c => {
    const stale = DECK.date < todayLocal();
    return `
    <div class="eyebrow">
      <span class="day">${esc(DECK.day_label||DECK.date)}</span>
      <span class="sep"></span>
      <span class="freshdot ${stale?'stale':'ok'}">${stale?'yesterday’s deck':'updated '+esc(relTime(DECK.generated_at))}</span>
    </div>
    <h1 class="big">${esc(c.headline)}</h1>
    <div class="statpills">
      <div class="statpill"><b>${c.counts.stories}</b><span>World</span></div>
      <div class="statpill"><b>${c.counts.markets}</b><span>Markets</span></div>
      <div class="statpill"><b>${c.counts.learn}</b><span>Learn</span></div>
    </div>
    ${c.big_picture?expandBtn('openCover()', 'The big picture'):''}
    <div class="scrollcue">swipe up to begin ↑</div>`;
  },

  story: c => `
    <div class="meta">${catChip(c.category)}${threadRibbon(c.thread)}${c.importance==='critical'?'<span style="color:var(--down)">● critical</span>':''}</div>
    <h1>${esc(c.title)}</h1>
    ${mootBlock(c.moot)}
    ${chips(c.concepts)}
    ${expandBtn(`openDecode(${JSON.stringify(c.id)})`, 'Read the full story')}`,

  divider: c => `<div class="bigemoji">${esc(c.emoji)}</div><div class="t">${esc(c.title)}</div>
    ${c.subtitle?`<div class="sub">${esc(c.subtitle)}</div>`:''}
    <div class="scrollcue">swipe up ↑</div>`,

  market_story: c => `
    <div class="meta">${catChip('markets')} <span>the market story</span></div>
    ${mootBlock(c.moot, "Today's markets in one line")}
    ${expandBtn(`openDecode(${JSON.stringify(c.id)})`, 'Read the full breakdown')}`,

  board: c => `
    <div class="meta">${catChip('markets')} <span>today's board — tap a row to learn it</span></div>
    <div>${c.items.map((b,i)=>`<div class="brow" onclick='openBoardRead(${i})'>
      <div class="nm"><b>${esc(b.name)}</b><span>${esc(b.ticker)}</span></div>
      ${sparkSVG(b.spark)}
      <div class="val"><span class="num">${esc(b.currency||'')}${esc(b.value)}</span><span class="pct ${cls(b.change_pct)}">${sgn(b.change_pct)}</span></div>
    </div>`).join('')}</div>
    ${mootBlock(c.moot)}`,

  watch: c => `
    <div class="meta">${catChip('markets')}<span>watch #${esc(c.rank)}</span>${(c.tickers||[]).slice(0,3).map(t=>`<span class="stance">${esc(t)}</span>`).join('')}</div>
    <h1>${esc(c.title)}</h1>
    ${mootBlock(c.moot)}
    ${chips(c.concepts)}
    ${expandBtn(`openDecode(${JSON.stringify(c.id)})`, 'Why it matters')}`,

  favorite: c => `
    <div class="meta">${catChip('markets')}<span>your stock</span>${c.moot?`<span class="stance">${esc(c.moot)}</span>`:''}</div>
    <h1>${esc(c.name||c.ticker)} <span style="color:var(--dim);font-size:16px">${esc(c.ticker)}</span></h1>
    <div class="price">${esc(c.currency||'')}${c.price!=null?Number(c.price).toLocaleString():'—'}<span class="pct ${cls(c.change_pct)}">${sgn(c.change_pct)}</span></div>
    ${expandBtn(`openDecode(${JSON.stringify(c.id)})`, 'What changed & why')}`,

  concept: c => {
    const g = (typeof GLOSSARY!=='undefined')&&GLOSSARY[c.key];
    if(!g) return `<h1>🎓</h1>`;
    return `
      <div class="meta">${catChip('learn')}<span>concept of the day</span>${c.why_today?`<span style="color:var(--amber)">★ live today</span>`:''}</div>
      <h1>${esc(g.term)}</h1>
      ${mootBlock(g.one, 'In one line')}
      ${expandBtn(`openGloss(${JSON.stringify(c.key)})`, 'Learn how to read it')}`;
  },

  quiz: c => `
    <div class="meta">${catChip('learn')}<span>flashback · ${esc(c.context_date)}</span></div>
    <h1 style="font-size:20px">${esc(c.context_title)}</h1>
    <div class="body" style="text-align:center;color:var(--dim)">${esc(c.question)}</div>
    <div class="moot veil" onclick="this.classList.add('open')">
      <div class="lbl">💡 The lesson (tap to reveal)</div>
      <div class="txt">${esc(c.answer)}</div>
      <div class="tap">👆 tap to reveal</div></div>
    ${chips(c.concepts)}`,

  outro: c => `
    <div class="meta">${catChip('markets')}<span>quick hits — also notable today</span></div>
    ${(c.also_notable||[]).slice(0,4).map(n=>`<div class="note"><b>${esc(n.title)}</b><div class="w">${esc(n.why)}</div></div>`).join('')||'<div class="body">Nothing else cleared the bar today.</div>'}
    <a class="expand" style="text-decoration:none" href="${esc(c.dashboard_url||'../')}">Open the full dashboard <span class="ar">→</span></a>
    <div class="disc">${esc(c.disclaimer)}${IS_LOCAL?' · Live refresh & any-ticker analysis available on the local dashboard.':''}</div>`
};

/* ---------- reel assembly + Stories-style progress ---------- */
const EXTRA = {cover:'cover', divider:'divider'};   // extra class on top of .card
const cardCat = c => c.category || ({concept:'learn', quiz:'learn'})[c.type] || 'markets';
const TAB_CAT = {global:'geopolitics', india:'india', markets:'markets'};
// which of the three tabs a card belongs to — India stories split out by category
function pillarOf(c){
  if(c.type==='story') return c.category==='india' ? 'india' : 'global';
  return ({cover:'global', quiz:'global', outro:'global',
    divider:'markets', market_story:'markets', board:'markets', watch:'markets',
    favorite:'markets', concept:'markets'})[c.type] || 'global';
}
let PILLARSEL = 'global';

function setPillar(p){
  if(!DECK) return;
  PILLARSEL = p;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on', b.dataset.p===p));
  document.getElementById('tabs').style.setProperty('--tabcat', `var(--${TAB_CAT[p]})`);
  render();
  document.getElementById('deck').scrollTo(0,0);
}

function render(){
  const deck = document.getElementById('deck');
  let cards = DECK.cards.filter(c => pillarOf(c)===PILLARSEL).map(c=>({card:c}));
  // India tab has no cover (that's the global intro) — synthesise a light intro
  if(PILLARSEL==='india'){
    const n = cards.filter(x=>x.card.type==='story').length;
    cards.unshift({intro:`<div class="daylbl">${esc(DECK.day_label||DECK.date)}</div>
      <div class="bigemoji">🇮🇳</div><h1 class="big">India</h1>
      <div class="body" style="color:var(--dim)">${n} decoded ${n===1?'story':'stories'} from home today.</div>
      <div class="scrollcue">swipe up ↑</div>`, extra:'cover', cat:'india'});
  }

  deck.innerHTML = cards.map((x,i)=>{
    const cat = x.card ? cardCat(x.card) : x.cat;
    const inner = x.card ? (R[x.card.type]||(()=>''))(x.card) : (x.intro || '');
    const extra = x.card ? (EXTRA[x.card.type]||'') : (x.extra||'');
    return `<section class="card ${extra}" data-i="${i}" style="${catStyle(cat)}">${inner}</section>`;
  }).join('');

  const prog = document.getElementById('progress');
  prog.innerHTML = cards.map((_,i)=>`<i data-i="${i}"></i>`).join('');
  const segs = [...prog.children];
  // "on" = the card crossing the vertical middle → the progress segment tracks which reel you're on
  const io = new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      const i = +e.target.dataset.i;
      segs.forEach((s,j)=>{ s.className = j<i?'done':(j===i?'on':''); });
    }});
  },{rootMargin:'-45% 0px -45% 0px', threshold:0});
  [...deck.children].forEach(el=>io.observe(el));
}

// re-pull the latest deck (regenerates ~every 2h on the laptop; SW is network-first so the phone gets it)
function refreshNow(btn){
  if(btn) btn.classList.add('spin');
  fetch('../reels.json?_='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
    .then(d=>{ if(d) DECK=d; render();
      setTimeout(()=>btn&&btn.classList.remove('spin'), 500);
    });
}

/* ---------- bottom sheet ---------- */
function openSheet(title, html, cat){
  const sheet = document.getElementById('sheet');
  sheet.style.setProperty('--cat', `var(--${CAT[cat]?cat:'markets'})`);
  document.getElementById('stitle').textContent = title;
  document.getElementById('sbody').innerHTML = html;
  document.getElementById('sbody').scrollTop = 0;
  document.getElementById('mask').classList.add('open');
  sheet.classList.add('open');
}
function closeSheet(){
  document.getElementById('mask').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheet(); });

// Break prose into short sentence-bullets. Protect abbreviations so we never split "U.S." / "e.g.";
// require a SPACE after the period so decimals ("3.5 million") stay intact.
const ABBR = /\b(U\.S|U\.K|U\.N|E\.U|e\.g|i\.e|Mr|Mrs|Ms|Dr|Prof|Sen|Rep|Gov|Gen|Lt|Sgt|St|Jr|Sr|vs|etc|Inc|Ltd|Co|Corp|approx|No|Fig|a\.m|p\.m|Ph\.D)\./g;
function toBullets(text){
  if(!text) return [];
  try{
    const SENT = String.fromCharCode(1);                    // sentinel for abbreviation dots
    const masked = String(text).replace(ABBR, m=>m.split('.').join(SENT));
    return masked.split(/(?<=[.!?])\s+(?=[A-Z0-9"'“])/)
      .map(s=>s.split(SENT).join('.').trim()).filter(Boolean);
  }catch(e){ return [String(text).trim()]; }   // regex-lookbehind fallback (very old engines)
}
// one bulleted section: icon-led header + list; each bullet keeps number highlighting. Skips if empty.
function bulletSec(icon, label, items){
  const arr = (Array.isArray(items) ? items : toBullets(items)).filter(Boolean);
  if(!arr.length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">${icon}</span>${esc(label)}</div>`
    + `<ul>${arr.map(t=>`<li>${hl(t)}</li>`).join('')}</ul></div>`;
}
function keyTermsSec(terms){
  if(!(terms||[]).length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">📚</span>Key terms</div>`
    + terms.map(t=>`<div class="kt"><b>${esc(t.term)}</b> — ${esc(t.definition)}</div>`).join('') + `</div>`;
}
function sourcesSec(sources){
  if(!(sources||[]).length) return '';
  return `<div class="bsec"><div class="bh"><span class="bi">🔗</span>Sources</div>`
    + sources.map(s=>`<div class="src"><a href="${esc(s.url)}" target="_blank">${esc(s.name)}</a></div>`).join('') + `</div>`;
}
function pinnedMoot(txt){ return txt?`<div class="sheetmoot"><div class="lbl">💡 The takeaway</div><div class="txt">${esc(txt)}</div></div>`:''; }

// primary narrative that lives ONLY in the sheet (hidden on the reel face), by card type
const LEAD = {story:'what_happened', watch:'gist', favorite:'whats_new', market_story:'story'};
function openDecode(id){
  const c = DECK.cards.find(x=>x.id===id); if(!c) return;
  const d = c.depth||{}; let h = '';
  // pin the takeaway, then the essentials as bullets (AI key_points if present, else auto-split the lead)
  if(c.type==='story'||c.type==='watch') h += pinnedMoot(c.moot);
  const keyItems = (c.key_points && c.key_points.length) ? c.key_points : toBullets(c[LEAD[c.type]]);
  const keyLabel = {story:'Key points', watch:'Key points', favorite:'What changed', market_story:'Key points'}[c.type] || 'Key points';
  h += bulletSec('✦', keyLabel, keyItems);

  if(c.thread){
    h += bulletSec('🧵', 'Previously', c.thread.previously);
    h += bulletSec('🔄', 'What changed today', c.thread.changed);
  }
  if(c.type==='story'){
    h += bulletSec('❓', 'Why it matters', d.why_it_matters);
    h += bulletSec('🌊', 'Ripple effects', d.ripple_effects);
    h += bulletSec('⏱️', 'Why now', d.why_now);
    h += bulletSec('👀', 'Watch next', d.watch_next);
    h += bulletSec('📖', 'The backstory', d.background);
    h += bulletSec('📊', 'Market link', d.market_link);
  }
  if(c.type==='watch'){
    h += bulletSec('🎯', 'What it means for you', c.what_it_means);
    h += bulletSec('❓', 'Why it matters', d.why_it_matters);
    h += bulletSec('👀', 'Watch', d.watch);
  }
  if(c.type==='favorite'){
    if(Array.isArray(d.news)&&d.news.length)
      h += `<div class="bsec"><div class="bh"><span class="bi">📰</span>Recent news</div>`
         + d.news.map(n=>`<div class="src">${n.url?`<a href="${esc(n.url)}" target="_blank">${esc(n.headline)}</a>`:esc(n.headline)}${n.source?` <span style="color:var(--dim)">— ${esc(n.source)}</span>`:''}</div>`).join('') + `</div>`;
    h += bulletSec('📊', 'Fundamentals', typeof d.fundamentals==='string'?d.fundamentals:null);
    h += bulletSec('📈', 'Technicals', typeof d.technicals==='string'?d.technicals:null);
    h += bulletSec('🚀', 'Catalysts', typeof d.catalysts==='string'?d.catalysts:null);
    h += bulletSec('⚠️', 'Risks', typeof d.risks==='string'?d.risks:null);
  }
  if(c.type==='market_story'){
    const g = d.global_summary||{};
    h += bulletSec('🇺🇸', 'United States', g.us);
    h += bulletSec('🇮🇳', 'India', g.india);
    h += bulletSec('₿', 'Crypto', g.crypto);
    h += bulletSec('🌍', 'Macro', g.macro);
    h += bulletSec('🗓️', "Today's catalysts", d.catalysts_today);
    h += bulletSec('⚠️', 'Risks', (d.risks||[]).map(x=>typeof x==='string'?x:JSON.stringify(x)));
  }
  h += keyTermsSec(d.key_terms);
  h += sourcesSec(d.sources);
  openSheet(c.title||c.name||'Decoded', h, c.category);
}

function openCover(){
  const c = DECK.cards.find(x=>x.type==='cover'); if(!c) return;
  let h = bulletSec('✦', 'The big picture', c.big_picture);
  if(c.market_headline) h += bulletSec('📈', 'Markets today', c.market_headline);
  openSheet(c.headline, h, 'markets');
}

function openBoardRead(i){
  const c = DECK.cards.find(x=>x.type==='board'); if(!c) return;
  const b = c.items[i]; if(!b) return;
  openSheet(`${b.name} — ${b.currency||''}${b.value} (${sgn(b.change_pct)})`,
    bulletSec('💡', 'What this number is telling you', b.read)
    + (b.spark?`<div class="bsec"><div class="bh"><span class="bi">📉</span>Last ${b.spark.length} briefs</div><div class="src">${b.spark.map(v=>v.toLocaleString()).join(' → ')}</div></div>`:''),
    'markets');
}

function openGloss(key){
  const g = (typeof GLOSSARY!=='undefined')&&GLOSSARY[key]; if(!g) return;
  openSheet(g.term,
    `<div class="one">${esc(g.one)}</div>`
    + bulletSec('📊', 'What it measures', g.what)
    + bulletSec('🔍', 'How to read it', g.read)
    + bulletSec('💡', 'Why it matters to you', g.why)
    + (g.scale?`<div class="scale">${esc(g.scale)}</div>`:''), 'learn');
}

/* ---------- boot ---------- */
// the deck (reels.json) regenerates ~every 2h on the laptop; fetch the latest
fetch('../reels.json?_='+Date.now())
  .then(r=>{ if(!r.ok) throw 0; return r.json(); })
  .then(d=>{ DECK=d; setPillar('global'); })   // default to the Global deck
  .catch(()=>{ document.getElementById('empty').style.display='flex'; });

if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
